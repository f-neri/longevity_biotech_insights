name: Weekly Data Update

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: weekly-data-update
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Refresh dashboard data
        run: lbi-update

      - name: Detect data changes
        id: changes
        run: |
          if git diff --quiet -- data/companies_raw.csv data/companies_clean.csv data/companies_clean.parquet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update refresh pull request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          add-paths: |
            data/companies_raw.csv
            data/companies_clean.csv
            data/companies_clean.parquet
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          base: main
          body-path: .github/PULL_REQUEST_TEMPLATE/data-refresh.md
          branch: automation/weekly-data-refresh
          commit-message: "chore(data): refresh dashboard artifacts"
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          delete-branch: true
          title: "chore(data): weekly data refresh"

      - name: No data changes
        if: steps.changes.outputs.changed != 'true'
        run: echo "No tracked data changes detected; skipping pull request creation."