name: Weekly Data Update

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-data-update
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Refresh dashboard data
        run: lbi-update

      - name: Detect data changes
        id: changes
        run: |
          if git diff --quiet -- data/companies_raw.csv data/companies_clean.csv data/companies_clean.parquet data/detail_lookups.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated artifacts
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/companies_raw.csv data/companies_clean.csv data/companies_clean.parquet data/detail_lookups.json
          git commit -m "chore: weekly data refresh"
          git push