name: Hugging Face Mirror

on:
  push:
    branches:
      - main
    paths:
      - data/companies_raw.csv
      - data/companies_clean.csv
      - data/companies_clean.parquet
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Validate Hugging Face mirror secrets
        env:
          HF_USERNAME: ${{ vars.HF_USERNAME }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO: ${{ vars.HF_SPACE_REPO }}
        run: |
          test -n "$HF_USERNAME" || (echo "Missing required variable: HF_USERNAME" && exit 1)
          test -n "$HF_TOKEN" || (echo "Missing required secret: HF_TOKEN" && exit 1)
          test -n "$HF_SPACE_REPO" || (echo "Missing required variable: HF_SPACE_REPO" && exit 1)

      - name: Mirror main to Hugging Face Space
        env:
          HF_USERNAME: ${{ vars.HF_USERNAME }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO: ${{ vars.HF_SPACE_REPO }}
        run: |
          git push "https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_REPO}" HEAD:main
